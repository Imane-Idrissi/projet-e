version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gestion-commerciale-db
    environment:
      POSTGRES_DB: gestion_commerciale
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
