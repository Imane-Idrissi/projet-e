<!-- Toast -->
<div *ngIf="toast" class="toast" [ngClass]="'toast-' + toast.type">{{ toast.message }}</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <h1>Produits &amp; Catalogue</h1>
    <span class="breadcrumb">Accueil / Produits &amp; Catalogue</span>
  </div>
  <div class="topbar-right">
    <div class="search-input">
      <input type="text" placeholder="Rechercher...">
    </div>
    <div class="topbar-avatar">I</div>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="filter-left">
    <div class="search-input filter-search">
      <input type="text" placeholder="Référence, libellé..." [(ngModel)]="filtreTexte">
    </div>
    <button class="chip" [class.active]="filtreCategorie === null" (click)="setFiltreCategorie(null)">
      Toutes catégories
    </button>
    <button *ngFor="let cat of categories" class="chip"
            [class.active]="filtreCategorie === cat.id"
            (click)="setFiltreCategorie(cat.id)">
      {{ cat.nom }}
    </button>
  </div>
  <a routerLink="/produits/nouveau" class="btn btn-primary">+ Produit</a>
</div>

<!-- Grille de produits -->
<div class="products-content">
  <div *ngIf="loading" class="loading">Chargement...</div>

  <div *ngIf="!loading && produitsFiltres.length === 0" class="empty">
    Aucun produit trouvé.
  </div>

  <div *ngIf="!loading && produitsFiltres.length > 0" class="products-grid">
    <div *ngFor="let produit of produitsFiltres" class="product-card">
      <!-- Image zone -->
      <div class="card-image" [class.stock-alert-bg]="produit.stockBas">
        <span class="card-icon">{{ getIcon(produit) }}</span>
        <span *ngIf="produit.stockBas" class="alert-badge">&#9888; Stock</span>
      </div>

      <!-- Card body -->
      <div class="card-body">
        <span class="card-ref">{{ produit.reference }}</span>
        <h3 class="card-name">{{ produit.designation }}</h3>
        <div class="card-bottom">
          <span class="card-price">{{ produit.prixHT | number:'1.0-0':'fr' }} MAD</span>
          <span class="stock-badge" [class.stock-low]="produit.stockBas" [class.stock-ok]="!produit.stockBas">
            Stock: {{ produit.quantiteStock }}
          </span>
        </div>
        <div class="card-actions">
          <a [routerLink]="['/produits/modifier', produit.id]" class="action-link edit">Modifier</a>
          <button class="action-link archive" (click)="archiverProduit($event, produit)">Archiver</button>
        </div>
      </div>
    </div>
  </div>
</div>
