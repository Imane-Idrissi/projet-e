<div class="app-layout" [class.sidebar-collapsed]="!sidebarOpen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>GC</h2>
      <span class="sidebar-title">Gestion Commerciale</span>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/produits" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#128230;</span>
        <span class="nav-label">Produits</span>
      </a>
      <a routerLink="/categories" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#128193;</span>
        <span class="nav-label">Catégories</span>
      </a>
      <a routerLink="/stock-alertes" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">&#9888;</span>
        <span class="nav-label">Alertes Stock</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-bar">
      <button class="toggle-btn" (click)="toggleSidebar()">&#9776;</button>
      <h1>{{ title }}</h1>
    </header>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
