spring:
  application:
    name: gestion-commerciale-produits

  datasource:
    url: jdbc:postgresql://localhost:5432/gestion_commerciale
    username: app_user
    password: app_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

# Seuil d'alerte stock bas (RG-PRD-05)
app:
  stock:
    seuil-alerte: 10
